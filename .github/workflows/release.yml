name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bundle:
    name: bundle / ${{ matrix.os }} / ${{ matrix.format }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            format: dmg
            runner: macos-latest
          - os: windows
            format: msi
            runner: windows-latest
          - os: linux
            format: deb
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate installer manifest
        run: python scripts/validate_installer.py ${{ matrix.os }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build bundle
        run: |
          echo "Building ${{ matrix.format }} for ${{ matrix.os }}"
          # tauri build --bundles ${{ matrix.format }}

      - name: Codesign (macOS)
        if: matrix.os == 'macos'
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: echo "codesign + notarize using $MACOS_SIGNING_IDENTITY"

      - name: Codesign (Windows)
        if: matrix.os == 'windows'
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: echo "signtool sign using cert from env"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sera-${{ matrix.os }}-${{ matrix.format }}
          path: dist/

  publish:
    name: publish release
    needs: bundle
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create GitHub Release
        run: echo "gh release create ${{ github.ref_name }} dist/*"
